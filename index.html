<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

<h1>🔒 Gerador de Senhas</h1>

<div class="senha-box">

<input
type="text"
id="senha"
readonly
placeholder="Sua senha aparecerá aqui">

<button id="copiar">📋 Copiar</button>

</div>

<div class="config">

<label>Tamanho</label>

<div class="range">

<input
type="range"
min="4"
max="64"
value="16"
id="tamanho">

<span id="valorTamanho">16</span>

</div>

<label><input type="checkbox" id="maiusculas" checked> Letras Maiúsculas</label>

<label><input type="checkbox" id="minusculas" checked> Letras Minúsculas</label>

<label><input type="checkbox" id="numeros" checked> Números</label>

<label><input type="checkbox" id="simbolos" checked> Símbolos</label>

<label><input type="checkbox" id="parecidos"> Remover caracteres parecidos</label>

</div>

<div class="botoes">

<button id="gerar">Gerar Senha</button>

<button id="limpar">Limpar</button>

</div>

<div class="forca">

<p>Força:</p>

<div class="barra">

<div id="nivel"></div>

</div>

<span id="textoForca">-</span>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
